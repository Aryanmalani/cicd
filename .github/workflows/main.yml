# The name of the workflow as it appears in the GitHub Actions tab
name: GitHub Actions Demo

# Defines the events that trigger the workflow (e.g., every time you push code)
on: [push]

# Groups all the tasks that run in the workflow
jobs:
  build-and-test:
    # Specifies the type of virtual machine to run the job on
    runs-on: ubuntu-latest

    # A sequence of tasks to be executed
    steps:
      # 1. Standard action to download your repository code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Run a simple shell command
      - name: Run a Hello World script
        run: echo "Hello, GitHub Actions is working!"

      # 3. Example of running multiple commands
      - name: List files in the repository
        run: |
          ls -R
          echo "Process complete."
